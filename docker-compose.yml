services:
  zwiedzamtu:
    build: .
    image: zwiedzamtu-frontend
    container_name: zwiedzamtu-frontend
    restart: unless-stopped
    ports:
      # The mikr.us edge terminates HTTPS and proxies to this plain-HTTP port.
      # Caddy no longer handles TLS, so the 443 mappings and the ./certs mount
      # (provider cert from nazwa.pl) are gone — they were never in the request
      # path.
      - "8080:8080"
